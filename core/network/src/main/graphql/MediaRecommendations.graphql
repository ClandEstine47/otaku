query MediaRecommendations(
    $id: Int!
    $page:Int = 1,
    $perPage:Int = 20
) {
    Media(id: $id) {
        id
        idMal
        recommendations(
            page:$page
            perPage: $perPage
        ) {
            edges {
                node {
                    mediaRecommendation {
                        id
                        idMal
                        title {
                            english
                            romaji
                        }
                        type
                        format
                        status
                        genres
                        episodes
                        chapters
                        bannerImage
                        volumes
                        coverImage {
                            large
                            extraLarge
                        }
                        meanScore
                        nextAiringEpisode {
                            episode
                        }
                    }
                }
            }
        }
    }
}